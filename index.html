<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Console Tactique Intégrée - SDIS 33</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #121212; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #121212; z-index: 1; }
        
        /* BARRE DE NAVIGATION (ONGLETS) */
        #nav-tabs {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1010;
            display: flex; gap: 4px; background: rgba(20, 20, 20, 0.95); padding: 4px; border-radius: 6px; border: 1px solid #333;
            transition: all 0.3s ease;
        }
        .tab-btn { flex: 1; padding: 10px 4px; border: none; background: #222; color: #aaa; font-weight: bold; font-size: 11px; border-radius: 4px; cursor: pointer; text-transform: uppercase; text-align: center; }
        .tab-btn.active { background: #b91c1c; color: white; box-shadow: 0 0 10px rgba(185, 28, 28, 0.5); }
        .tab-btn:hover { background: #333; }

        /* PANNEAUX DE CONTRÔLE CONTEXTUELS */
        .control-panel {
            position: absolute; top: 60px; left: 10px; right: 10px; z-index: 1000;
            background: rgba(25, 25, 25, 0.96); color: white; padding: 10px; 
            border-radius: 8px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; font-size: 12px;
            transition: all 0.3s ease;
        }
        .control-panel.active { display: flex; }
        .flex-group { display: flex; gap: 6px; align-items: center; }
        
        /* BOUTONS ET INPUTS UI */
        .btn-action { padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; color: white; }
        .btn-green { background: #10b981; }
        .btn-blue { background: #0284c7; }
        .btn-red { background: #b91c1c; }
        .btn-purple { background: #8b5cf6; }
        .btn-toggle { background: #374151; border: 1px solid #4b5563; }
        
        .select-ui, .input-ui { background: #333; border: 1px solid #555; color: white; padding: 6px; border-radius: 3px; font-weight: bold; font-size: 11px; text-align: center; }
        
        /* RECTANGLES DE SAISIE ÉLARGIS POUR LAMBERTMAPS */
        .input-lambert { width: 140px; font-size: 12px; letter-spacing: 0.5px; }
        
        .info-txt { font-weight: bold; color: #38bdf8; font-size: 11px; }

        /* LÉGENDES OPÉRATIONNELLES FLOTTANTES */
        .legende-flottante {
            position: absolute; bottom: 15px; right: 15px; z-index: 1005;
            background: rgba(20, 20, 20, 0.95); padding: 8px 12px; border-radius: 6px; border: 1px solid #444;
            display: none; flex-direction: column; gap: 4px; width: 90px; font-size: 10px; font-weight: bold;
        }
        .legende-item { display: flex; align-items: center; justify-content: space-between; padding: 2px 5px; border-radius: 3px; color: black; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div style="position: absolute; top: 14px; right: 15px; z-index: 1020;">
        <button class="btn-action btn-toggle" onclick="basculerPleinEcran()" id="btn-masquer">👁️ Masquer les outils</button>
    </div>

    <div id="nav-tabs">
        <button class="tab-btn active" onclick="switchApp('PERISECU', this)">⚠️ PERISECU</button>
        <button class="tab-btn" onclick="switchApp('CALSURFEU', this)">🔥 CALSURFEU</button>
        <button class="tab-btn" onclick="switchApp('LAMBERTMAPS', this)">🌐 LAMBERTMAPS</button>
        <button class="tab-btn" onclick="switchApp('DECIANALYSE', this)">💧 DECIANALYSE</button>
        <button class="tab-btn" onclick="switchApp('PERIMETRE-DECI', this)">📐 PLAN FIXE</button>
    </div>

    <div id="panel-PERISECU" class="control-panel active">
        <div class="flex-group">
            <button class="btn-action btn-green" onclick="declencherGps()">📍 Centre Position (GPS)</button>
            <button class="btn-action btn-red" onclick="nettoyerCouche('PERISECU')">❌ Effacer</button>
        </div>
        <div class="info-txt">Mode Terrain : Double-cliquez pour poser les périmètres de sécurité.</div>
    </div>

    <div id="panel-CALSURFEU" class="control-panel">
        <div class="flex-group">
            <button class="btn-action btn-purple" onclick="activerDessinPolygone()">✏️ Tracer le contour</button>
            <button class="btn-action btn-red" onclick="nettoyerCouche('CALSURFEU')">❌ Effacer tracé</button>
        </div>
        <div id="calcul-surface" class="info-txt">Surface estimée : 0.00 ha</div>
    </div>

    <div id="panel-LAMBERTMAPS" class="control-panel">
        <div class="flex-group">
            <input type="number" id="lambert-x" class="input-ui input-lambert" placeholder="Coordonnée X (Ex: 565400)">
            <input type="number" id="lambert-y" class="input-ui input-lambert" placeholder="Coordonnée Y (Ex: 2243100)">
            <button class="btn-action btn-blue" onclick="convertirEtProjeterLambert()">🗺️ Projeter</button>
        </div>
        <div id="Statut-lambert" class="info-txt">Saisir coordonnées Lambert II Étendu.</div>
    </div>

    <div id="panel-DECIANALYSE" class="control-panel">
        <div class="flex-group">
            <button class="btn-action btn-red" onclick="nettoyerCouche('DECIANALYSE')">❌ Effacer PEI</button>
        </div>
        <div class="info-txt">Double-cliquez pour vérifier la couverture DECI (200m et 400m).</div>
    </div>

    <div id="panel-PERIMETRE-DECI" class="control-panel">
        <div class="flex-group">
            <button class="btn-action btn-purple" onclick="document.getElementById('file-input').click()">📁 Ouvrir Plan / PDF</button>
            <input type="file" id="file-input" accept="application/pdf,image/*">
            
            <select id="select-distance" class="select-ui">
                <option value="400">400 m</option>
                <option value="1000">1 km</option>
                <option value="2000" selected>2 km (Carré DFCI)</option>
            </select>
            <button id="btn-regle" class="btn-action btn-blue" onclick="basculerModeRegle()">📏 Règle Échelle</button>
            <input type="number" id="input-scale" class="input-ui" style="width:60px;" value="300" onchange="mettreAJourEchelleDirecte(this.value)"> <span>px pour 2km</span>
        </div>
        <button class="btn-action btn-red" onclick="nettoyerCouche('PERIMETRE-DECI')">❌ Effacer plan</button>
    </div>

    <div id="legende-STANDARD" class="legende-flottante" style="display: flex;">
        <div class="legende-item" style="background: #ff5252;"><span>200 m</span></div>
        <div class="legende-item" style="background: #ffab40;"><span>400 m</span></div>
        <div class="legende-item" style="background: #ffd740;"><span>1 km</span></div>
        <div class="legende-item" style="background: #29b6f6; color: white;"><span>2 km</span></div>
        <div class="legende-item" style="background: #66bb6a;"><span>4 km</span></div>
    </div>

    <div id="legende-DECI" class="legende-flottante">
        <div class="legende-item" style="background: #10b981; color: white;"><span>200 m</span></div>
        <div class="legende-item" style="background: #f59e0b; color: black;"><span>400 m</span></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <script>
        // Initialisation sécurisée de PDF.js
        if (window['pdfjs-dist/build/pdf']) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        }

        // Variables globales d'état
        let currentApp = "PERISECU";
        let interfaceMasquee = false;
        let PIXELS_POUR_2000M = 300; 
        let modeRegleActive = false;
        let pointsMesure = [];
        let pointsPolygoneFeu = [];
        let polygoneFeuActuel = null;
        let modeDessinFeu = false;

        // Initialisation de la carte Leaflet centrée sur la Gironde
        const map = L.map('map', { zoomControl: false, attributionControl: false, doubleClickZoom: false }).setView([44.89, -0.04], 11);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        // Déclaration des serveurs de tuiles cartographiques
        const osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
        const scan25IGN = L.tileLayer('https://data.geopf.fr/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&STYLE=normal&TILEMATRIXSET=PM&FORMAT=image/jpeg&LAYER=GEOGRAPHICALGRIDSYSTEMS.MAPS&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', { maxZoom: 18 });
        const satelliteIGN = L.tileLayer('https://data.geopf.fr/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&STYLE=normal&TILEMATRIXSET=PM&FORMAT=image/jpeg&LAYER=ORTHOIMAGERY.ORTHOPHOTOS&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', { maxZoom: 19 });
        
        // Ajout du sélecteur de couches en bas à gauche
        L.control.layers({ "Plan OpenStreetMap": osmStandard, "Carte Topo IGN": scan25IGN, "Vues Satellite": satelliteIGN }, null, { position: 'bottomleft', collapsed: true }).addTo(map);
        
        // Chargement immédiat du fond cartographique
        osmStandard.addTo(map);

        // Groupes de calques isolés pour chaque application
        const layers = {
            PERISECU: L.featureGroup().addTo(map),
            CALSURFEU: L.featureGroup().addTo(map),
            LAMBERTMAPS: L.featureGroup().addTo(map),
            DECIANALYSE: L.featureGroup().addTo(map),
            "PERIMETRE-DECI": L.featureGroup().addTo(map)
        };
        let currentPlanPdf = null;

        // ================= BI-DIRECTION SWITCH ONGLET =================
        function switchApp(appName, element) {
            currentApp = appName;
            modeDessinFeu = false;
